name: Deploy AI Daily Site

on:
  workflow_dispatch:
  push:
    branches: [main]
  schedule:
    # GitHub Actions uses UTC. This updates roughly every hour at :17.
    - cron: "17 * * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync public RSS sources
        run: |
          python3 scripts/rss_sync.py --max-age-days 45
          python3 scripts/aihot_sync.py --source-ids aihot-selected,aihot-daily --page-delay-ms 0

      - name: Build static web data
        run: |
          python3 scripts/build-web-data.py
          touch web/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
